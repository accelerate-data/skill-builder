name: CI (Windows)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  frontend-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            app/package-lock.json
            app/sidecar/package-lock.json

      - name: Upgrade npm to v11
        run: npm install -g npm@11

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Type check
        working-directory: app
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: app
        run: npm run test:unit

  rust-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      - name: Stub sidecar dist for Tauri resource validation
        shell: bash
        run: mkdir -p app/sidecar/dist

      - name: Cargo test
        working-directory: app/src-tauri
        run: cargo test

      - name: Clippy
        working-directory: app/src-tauri
        run: cargo clippy -- -D warnings
