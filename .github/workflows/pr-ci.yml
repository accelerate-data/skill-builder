name: PR CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  platform-linux:
    name: platform-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: |
            app/package-lock.json
            app/sidecar/package-lock.json

      - name: Install npm dependencies
        working-directory: app
        run: npm ci --prefer-offline --ignore-scripts

      - name: Type check
        working-directory: app
        run: npx tsc --noEmit

      - name: Install sidecar dependencies
        working-directory: app/sidecar
        run: npm ci --prefer-offline

      - name: Sidecar unit tests
        working-directory: app/sidecar
        run: npx vitest run

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      - name: Stub sidecar dist for Tauri resource validation
        run: mkdir -p app/sidecar/dist

      - name: Cargo test
        working-directory: app/src-tauri
        run: cargo test

      - name: Clippy
        working-directory: app/src-tauri
        run: cargo clippy -- -D warnings

      - name: Run codegen
        working-directory: app
        run: npm run codegen

      - name: Check codegen freshness
        run: |
          git diff --exit-code app/src/generated/ app/sidecar/generated/ app/src-tauri/src/generated/

  platform-windows:
    name: platform-windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: |
            app/package-lock.json
            app/sidecar/package-lock.json

      - name: Install npm dependencies
        working-directory: app
        run: npm ci --prefer-offline --ignore-scripts

      - name: Type check
        working-directory: app
        run: npx tsc --noEmit

      - name: Install sidecar dependencies
        working-directory: app/sidecar
        run: npm ci --prefer-offline

      - name: Sidecar unit tests
        working-directory: app/sidecar
        run: npx vitest run

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      - name: Stub sidecar dist for Tauri resource validation
        shell: bash
        run: mkdir -p app/sidecar/dist

      - name: Cargo test
        working-directory: app/src-tauri
        run: cargo test

      - name: Clippy
        working-directory: app/src-tauri
        run: cargo clippy -- -D warnings

  platform-macos:
    name: platform-macos
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: |
            app/package-lock.json
            app/sidecar/package-lock.json

      - name: Install npm dependencies
        working-directory: app
        run: npm ci --prefer-offline --ignore-scripts

      - name: Type check
        working-directory: app
        run: npx tsc --noEmit

      - name: Install sidecar dependencies
        working-directory: app/sidecar
        run: npm ci --prefer-offline

      - name: Sidecar unit tests
        working-directory: app/sidecar
        run: npx vitest run

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      - name: Stub sidecar dist for Tauri resource validation
        run: mkdir -p app/sidecar/dist

      - name: Cargo test
        working-directory: app/src-tauri
        run: cargo test

      - name: Clippy
        working-directory: app/src-tauri
        run: cargo clippy -- -D warnings

  frontend-unit:
    name: frontend-unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        working-directory: app
        run: npm ci --prefer-offline --ignore-scripts

      - name: Unit tests
        working-directory: app
        run: npm run test:unit

      - name: Guard tests
        working-directory: app
        run: npm run test:guard

  frontend-integration:
    name: frontend-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        working-directory: app
        run: npm ci --prefer-offline --ignore-scripts

      - name: Integration tests
        working-directory: app
        run: npm run test:integration
